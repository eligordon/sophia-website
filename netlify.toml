# Netlify + TinaCloud: set NEXT_PUBLIC_TINA_CLIENT_ID + TINA_TOKEN in
# Site configuration → Environment variables (see .env.example).
#
# Netlify uses build:netlify (not build:cloud) — see footer.

[build]
  command = "npm run build:netlify"
  publish = "."

[build.environment]
  NODE_VERSION = "22"

# ── Why build:netlify uses --skip-cloud-checks ─────────────────────────────
# TinaCloud stores a schema hash from GitHub ("last indexed at" in errors).
# Netlify compares that to the schema tinacms generates from your checkout.
# If those differ, the build fails — even when your repo is correct and the
# problem is Tina's index lagging or the GitHub→Tina webhook not firing
# (your "last indexed" time not updating after pushes is the smoking gun).
#
# build:netlify skips that equality check so deploys stay reliable. The admin
# still builds against TinaCloud (client id + token). Run `npm run build:cloud`
# locally before pushing if you want to validate schema sync.
#
# Fix the root cause in TinaCloud: project → check GitHub connection / re-auth,
# or Tina support if "last indexed" never moves after pushes to main.
#
# Do not use Netlify-only env vars in tina/config.ts for schema-affecting values
# (see tina/config.ts comments). FAQ: https://tina.io/docs/r/FAQ/
